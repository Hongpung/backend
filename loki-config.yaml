auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095

common:
  path_prefix: /loki
  ring:
    kvstore:
      store: inmemory

# 단일 바이너리 + 로컬 파일시스템 (boltdb-shipper 인덱스)
schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  filesystem:
    directory: /loki

ingester:
  wal:
    enabled: false

limits_config:
  allow_structured_metadata: false
